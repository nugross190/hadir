<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HADIR — PKS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F6F5F0;
  --bg-card: #FFFFFF;
  --bg-active: #EBF5EE;
  --bg-danger: #FEF0EF;
  --text: #1A1A18;
  --text-2: #5C5B57;
  --text-3: #9C9A92;
  --border: #E5E3DB;
  --accent: #1B7A43;
  --accent-light: #D4EDDB;
  --accent-dark: #145C32;
  --danger: #C53030;
  --danger-light: #FED7D7;
  --warning: #B7791F;
  --warning-light: #FEFCBF;
  --info: #2B6CB0;
  --info-light: #BEE3F8;
  --pks: #6B46C1;
  --pks-light: #E9D8FD;
  --pks-dark: #553C9A;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 14px rgba(0,0,0,0.08);
  --font: 'DM Sans', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  -webkit-tap-highlight-color: transparent;
}
.screen { display: none; min-height: 100dvh; padding: 0 0 32px; }
.screen.active { display: block; animation: fadeIn .25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.top-bar {
  position: sticky; top: 0; z-index: 10;
  background: var(--pks); color: #fff;
  padding: 16px 20px;
  display: flex; align-items: center; gap: 12px;
}
.top-bar h1 { font-size: 18px; font-weight: 600; letter-spacing: .5px; }
.top-bar .subtitle { font-size: 12px; opacity: .75; margin-top: 2px; }
.top-bar .back-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,.15); border: none; color: #fff;
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.top-bar .back-btn:active { background: rgba(255,255,255,.3); }
.top-bar .logout-btn {
  margin-left: auto; padding: 6px 12px;
  background: rgba(255,255,255,.15); border: none; color: #fff;
  border-radius: var(--radius-sm); font-size: 12px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
}
.top-bar .logout-btn:active { background: rgba(255,255,255,.3); }

.content { padding: 16px 16px 0; }
.section-label {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1.2px; color: var(--text-3);
  padding: 20px 16px 8px;
}
.card {
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 20px;
  margin-bottom: 12px; box-shadow: var(--shadow);
}
.input-group { margin-bottom: 16px; }
.input-group label {
  display: block; font-size: 13px; font-weight: 500;
  color: var(--text-2); margin-bottom: 6px;
}
.input-group input {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  font-family: var(--font); font-size: 16px;
  background: var(--bg); color: var(--text);
  transition: border-color .15s;
}
.input-group input:focus { outline: none; border-color: var(--pks); box-shadow: 0 0 0 3px var(--pks-light); }
.pin-input {
  font-family: var(--mono) !important;
  font-size: 28px !important; text-align: center;
  letter-spacing: 8px; font-weight: 500;
}
.btn {
  display: block; width: 100%;
  padding: 14px 20px; border: none; border-radius: var(--radius-sm);
  font-family: var(--font); font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all .15s; text-align: center;
}
.btn:active { transform: scale(.98); }
.btn-primary { background: var(--pks); color: #fff; }
.btn-primary:hover { background: var(--pks-dark); }
.btn-primary:disabled { background: var(--text-3); cursor: not-allowed; }
.btn-success { background: var(--accent); color: #fff; }
.btn-success:hover { background: var(--accent-dark); }
.btn-outline { background: transparent; color: var(--pks); border: 1.5px solid var(--pks); }

/* Login account buttons */
.account-grid { display: grid; grid-template-columns: 1fr; gap: 8px; padding: 8px 16px; }
.account-btn {
  padding: 16px; background: var(--bg-card);
  border: 1.5px solid var(--border); border-radius: var(--radius);
  font-family: var(--font); font-size: 15px; font-weight: 500;
  cursor: pointer; text-align: left; transition: all .15s;
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow);
}
.account-btn:active { transform: scale(.98); }
.account-btn .avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--pks-light); color: var(--pks);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 16px; flex-shrink: 0;
}
.account-btn.selected { border-color: var(--pks); background: #F5F0FF; }

/* Day warning banner */
.day-banner {
  margin: 16px; padding: 12px 16px;
  border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
  display: flex; align-items: center; gap: 8px;
}
.day-banner.monday { background: var(--accent-light); color: var(--accent-dark); }
.day-banner.not-monday { background: var(--warning-light); color: var(--warning); }

/* Class cards */
.class-card {
  background: var(--bg-card); border-radius: var(--radius);
  border: 1.5px solid var(--border); padding: 16px 20px;
  margin-bottom: 10px; cursor: pointer; transition: all .15s;
  display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow);
}
.class-card:active { transform: scale(.98); }
.class-card:hover { border-color: var(--pks); }
.class-card.done { border-color: var(--accent); background: var(--bg-active); }
.class-card .class-icon {
  width: 44px; height: 44px; border-radius: 12px;
  background: var(--pks-light); color: var(--pks);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; flex-shrink: 0;
}
.class-card.done .class-icon { background: var(--accent-light); color: var(--accent); }
.class-card .class-info { flex: 1; min-width: 0; }
.class-card .class-name { font-size: 15px; font-weight: 600; }
.class-card .class-meta { font-size: 12px; color: var(--text-3); margin-top: 2px; }
.class-card .class-status {
  font-size: 11px; font-weight: 600; padding: 4px 10px;
  border-radius: 20px; white-space: nowrap; flex-shrink: 0;
}
.class-card.done .class-status { background: var(--accent-light); color: var(--accent); }
.class-card:not(.done) .class-status { background: var(--bg); color: var(--text-3); border: 1px solid var(--border); }

/* Progress bar */
.progress-wrap { padding: 0 16px; margin-bottom: 4px; }
.progress-bar-bg {
  height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
}
.progress-bar-fill { height: 100%; background: var(--pks); border-radius: 3px; transition: width .3s; }
.progress-text { font-size: 12px; color: var(--text-3); margin-top: 4px; }

/* Student list */
.student-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.student-row:last-child { border-bottom: none; }
.student-num {
  width: 24px; font-size: 12px; color: var(--text-3);
  font-family: var(--mono); flex-shrink: 0; text-align: right;
}
.student-name { flex: 1; font-size: 14px; font-weight: 500; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.student-gender { font-size: 11px; color: var(--text-3); margin-top: 1px; }
.status-select {
  padding: 6px 10px; border-radius: 20px;
  border: 1.5px solid var(--border);
  font-family: var(--font); font-size: 12px; font-weight: 600;
  background: var(--bg); color: var(--text);
  cursor: pointer; flex-shrink: 0;
  appearance: none; -webkit-appearance: none;
  min-width: 110px; text-align: center;
}
.status-select:focus { outline: none; border-color: var(--pks); }
.status-select.hadir { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
.status-select.tidak_hadir { background: var(--danger-light); color: var(--danger); border-color: var(--danger); }
.status-select.izin { background: var(--info-light); color: var(--info); border-color: var(--info); }
.status-select.sakit { background: var(--warning-light); color: var(--warning); border-color: var(--warning); }
.status-select.alpa { background: #FFF5F5; color: #9B2C2C; border-color: #FC8181; }

/* Summary chips */
.summary-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.chip {
  padding: 4px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
}
.chip-hadir { background: var(--accent-light); color: var(--accent); }
.chip-tidak_hadir { background: var(--danger-light); color: var(--danger); }
.chip-izin { background: var(--info-light); color: var(--info); }
.chip-sakit { background: var(--warning-light); color: var(--warning); }
.chip-alpa { background: #FFF5F5; color: #9B2C2C; }

/* History rows */
.history-row {
  padding: 12px 0; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 12px;
}
.history-row:last-child { border-bottom: none; }
.history-date {
  font-size: 11px; font-family: var(--mono); color: var(--text-3);
  min-width: 52px;
}
.history-info { flex: 1; }
.history-class { font-size: 14px; font-weight: 600; }
.history-meta { font-size: 12px; color: var(--text-3); margin-top: 2px; }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: #fff;
  padding: 12px 20px; border-radius: 10px;
  font-size: 14px; font-weight: 500;
  box-shadow: var(--shadow-lg); z-index: 200;
  animation: toastIn .3s ease; pointer-events: none;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } }

.empty-state { text-align: center; padding: 40px 20px; color: var(--text-3); }
.empty-state .icon { font-size: 40px; margin-bottom: 8px; }

.divider { text-align: center; font-size: 11px; color: var(--text-3); padding: 12px 16px; font-weight: 500; }

.tab-bar {
  display: flex; background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 60px; z-index: 9;
}
.tab-btn {
  flex: 1; padding: 12px; border: none; background: transparent;
  font-family: var(--font); font-size: 13px; font-weight: 500;
  color: var(--text-3); cursor: pointer; border-bottom: 2px solid transparent;
  transition: all .15s;
}
.tab-btn.active { color: var(--pks); border-bottom-color: var(--pks); }

.sticky-submit {
  position: sticky; bottom: 0; background: var(--bg);
  border-top: 1px solid var(--border); padding: 12px 16px;
  z-index: 10;
}
</style>
</head>
<body>

<!-- ── SCREEN 1: Account Selection ──────────────────────────────────────────── -->
<div id="screen-accounts" class="screen active">
  <div class="top-bar">
    <div>
      <h1>PKS — Login</h1>
      <div class="subtitle">Patroli Keamanan Sekolah</div>
    </div>
  </div>
  <div class="section-label">Pilih Kelompok PKS</div>
  <div id="account-list" class="account-grid">
    <div class="empty-state"><div class="icon">⏳</div><div>Memuat data...</div></div>
  </div>
  <div class="content" id="pin-section" style="display:none">
    <div class="input-group">
      <label>Masukkan PIN</label>
      <input type="password" id="pin-input" class="pin-input" inputmode="numeric" maxlength="6" placeholder="••••">
    </div>
    <button class="btn btn-primary" onclick="doLogin()">Masuk</button>
    <div class="divider" id="selected-name-hint"></div>
  </div>
</div>

<!-- ── SCREEN 2: Class List ─────────────────────────────────────────────────── -->
<div id="screen-classes" class="screen">
  <div class="top-bar">
    <div>
      <h1 id="classes-title">Kelas Saya</h1>
      <div class="subtitle" id="classes-subtitle">Kelompok PKS</div>
    </div>
    <button class="logout-btn" onclick="doLogout()">Keluar</button>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('classes')" id="tab-classes">Kelas Patrol</button>
    <button class="tab-btn" onclick="switchTab('history')" id="tab-history">Riwayat</button>
  </div>

  <!-- Classes tab -->
  <div id="tab-content-classes">
    <div id="day-banner"></div>
    <div id="progress-section" class="progress-wrap" style="display:none">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-text" id="progress-text"></div>
    </div>
    <div class="section-label">Kelas X</div>
    <div id="class-list-x" style="padding:0 16px"></div>
    <div class="section-label">Kelas XI</div>
    <div id="class-list-xi" style="padding:0 16px"></div>
  </div>

  <!-- History tab -->
  <div id="tab-content-history" style="display:none">
    <div class="content">
      <div class="card" id="history-list">
        <div class="empty-state"><div class="icon">⏳</div><div>Memuat riwayat...</div></div>
      </div>
    </div>
  </div>
</div>

<!-- ── SCREEN 3: Student Check ──────────────────────────────────────────────── -->
<div id="screen-check" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="goTo('classes')">←</button>
    <div>
      <h1 id="check-title">Presensi Kelas</h1>
      <div class="subtitle" id="check-subtitle">Tandai kehadiran siswa</div>
    </div>
  </div>

  <div class="content">
    <!-- Summary chips -->
    <div class="card" style="padding:14px 20px">
      <div style="font-size:13px;font-weight:500;color:var(--text-2);margin-bottom:8px">Ringkasan Kehadiran</div>
      <div class="summary-chips" id="summary-chips">
        <span class="chip chip-hadir" id="chip-hadir">Hadir: 0</span>
        <span class="chip chip-tidak_hadir" id="chip-tidak_hadir">Tidak Hadir: 0</span>
        <span class="chip chip-izin" id="chip-izin">Izin: 0</span>
        <span class="chip chip-sakit" id="chip-sakit">Sakit: 0</span>
        <span class="chip chip-alpa" id="chip-alpa">Alpa: 0</span>
      </div>
    </div>

    <!-- Notes -->
    <div class="input-group">
      <label>Catatan Patroli (opsional)</label>
      <input type="text" id="check-notes" placeholder="Contoh: Kelas kondusif, 2 siswa izin sakit">
    </div>
    <div style="margin-bottom:12px">
      <button class="btn btn-outline" onclick="markAll('hadir')" style="font-size:13px;padding:10px">Tandai Semua Hadir</button>
    </div>
  </div>

  <!-- Student list -->
  <div style="padding:0 16px" id="student-list-wrap">
    <div class="card">
      <div id="student-list"></div>
    </div>
  </div>

  <!-- Sticky submit -->
  <div class="sticky-submit">
    <button class="btn btn-success" id="submit-btn" onclick="submitCheck()">Simpan Presensi</button>
  </div>
</div>

<script>
// ── State ───────────────────────────────────────────────────────────────────
let session = null;
let currentClassId = null;
let currentStudents = [];
const DAYS = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];

// ── Init ────────────────────────────────────────────────────────────────────
(function init() {
  try {
    const raw = sessionStorage.getItem('hadir_auth');
    if (raw) {
      const s = JSON.parse(raw);
      if (s.role === 'pks') {
        session = s;
        enterApp();
        return;
      }
    }
  } catch(e) { sessionStorage.removeItem('hadir_auth'); }

  loadAccounts();
})();

async function loadAccounts() {
  try {
    const r = await fetch('/pks/accounts');
    const accounts = await r.json();
    const el = document.getElementById('account-list');
    if (!accounts.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">⚠</div><div>Tidak ada akun PKS terdaftar</div></div>';
      return;
    }
    el.innerHTML = accounts.map(a => `
      <button class="account-btn" onclick="selectAccount(${a.pks_id},'${escHtml(a.username)}','${escHtml(a.name)}',this)">
        <div class="avatar">${a.group_number}</div>
        <div>
          <div style="font-weight:600">${escHtml(a.name)}</div>
          <div style="font-size:12px;color:var(--text-3);margin-top:2px">Kelompok ${a.group_number} · @${escHtml(a.username)}</div>
        </div>
      </button>`).join('');
  } catch(e) {
    document.getElementById('account-list').innerHTML =
      '<div class="empty-state"><div class="icon">⚠</div><div>Tidak dapat terhubung ke server</div></div>';
  }
}

let selectedAccountUsername = '';
let selectedAccountId = null;

function selectAccount(id, username, name, btn) {
  selectedAccountId = id;
  selectedAccountUsername = username;
  document.querySelectorAll('.account-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('pin-section').style.display = 'block';
  document.getElementById('selected-name-hint').textContent = `Masuk sebagai: ${name}`;
  document.getElementById('pin-input').focus();
}

async function doLogin() {
  const pin = document.getElementById('pin-input').value;
  if (!pin) return toast('Masukkan PIN');
  if (!selectedAccountUsername) return toast('Pilih akun terlebih dahulu');

  try {
    const r = await fetch('/pks/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username: selectedAccountUsername, pin}),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({detail:'PIN salah'}));
      return toast(err.detail || 'PIN salah');
    }
    const data = await r.json();
    session = data;
    sessionStorage.setItem('hadir_auth', JSON.stringify(data));
    enterApp();
  } catch(e) { toast('Gagal terhubung ke server'); }
}

function doLogout() {
  sessionStorage.removeItem('hadir_auth');
  session = null;
  selectedAccountId = null;
  selectedAccountUsername = '';
  document.getElementById('pin-input').value = '';
  document.getElementById('pin-section').style.display = 'none';
  document.querySelectorAll('.account-btn').forEach(b => b.classList.remove('selected'));
  loadAccounts();
  goTo('accounts');
}

// ── App ──────────────────────────────────────────────────────────────────────
function enterApp() {
  document.getElementById('classes-title').textContent = session.name;
  document.getElementById('classes-subtitle').textContent = `Kelompok ${session.group_number} · PKS`;
  goTo('classes');
  loadClasses();
  showDayBanner();
}

function showDayBanner() {
  const now = new Date();
  const day = now.getDay(); // 0=Sun, 1=Mon
  const dayName = DAYS[day];
  const banner = document.getElementById('day-banner');
  if (day === 1) {
    banner.innerHTML = `<span>✅</span> Hari <strong>Senin</strong> — Jadwal patroli aktif`;
    banner.className = 'day-banner monday';
  } else {
    banner.innerHTML = `<span>⚠️</span> Hari ini <strong>${dayName}</strong>. Patroli dijadwalkan setiap <strong>Senin</strong>`;
    banner.className = 'day-banner not-monday';
  }
}

async function loadClasses() {
  document.getElementById('class-list-x').innerHTML = '<div class="empty-state" style="padding:20px 0"><div>Memuat...</div></div>';
  document.getElementById('class-list-xi').innerHTML = '';

  try {
    const r = await fetch(`/pks/my-classes?pks_id=${session.pks_id}`);
    const classes = await r.json();

    const xClasses = classes.filter(c => c.grade_level === 10);
    const xiClasses = classes.filter(c => c.grade_level === 11);

    const done = classes.filter(c => c.checked_today).length;
    const total = classes.length;

    // Progress
    const pSec = document.getElementById('progress-section');
    pSec.style.display = 'block';
    document.getElementById('progress-fill').style.width = total ? `${(done/total)*100}%` : '0%';
    document.getElementById('progress-text').textContent = `${done} dari ${total} kelas sudah dipatroli hari ini`;

    document.getElementById('class-list-x').innerHTML = xClasses.map(c => classCardHTML(c)).join('') || '<div style="padding:0 0 8px;color:var(--text-3);font-size:13px">Tidak ada kelas X</div>';
    document.getElementById('class-list-xi').innerHTML = xiClasses.map(c => classCardHTML(c)).join('') || '<div style="padding:0 0 8px;color:var(--text-3);font-size:13px">Tidak ada kelas XI</div>';
  } catch(e) {
    document.getElementById('class-list-x').innerHTML = '<div class="empty-state"><div class="icon">⚠</div><div>Gagal memuat kelas</div></div>';
  }
}

function classCardHTML(c) {
  const done = c.checked_today;
  const gradeLabel = c.grade_level === 10 ? 'X' : 'XI';
  const checkedTime = c.checked_at ? ` · ${new Date(c.checked_at).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}` : '';
  return `
    <div class="class-card ${done?'done':''}" onclick="openClass(${c.class_id},'${escHtml(c.class_name)}')">
      <div class="class-icon">${gradeLabel}</div>
      <div class="class-info">
        <div class="class-name">${escHtml(c.class_name)}</div>
        <div class="class-meta">${c.student_count} siswa${checkedTime}</div>
      </div>
      <div class="class-status">${done ? '✓ Sudah' : 'Belum'}</div>
    </div>`;
}

async function openClass(classId, className) {
  currentClassId = classId;
  document.getElementById('check-title').textContent = className;
  document.getElementById('check-subtitle').textContent = 'Tandai kehadiran siswa';
  document.getElementById('check-notes').value = '';
  document.getElementById('student-list').innerHTML = '<div class="empty-state" style="padding:20px 0"><div>Memuat siswa...</div></div>';
  goTo('check');

  try {
    const r = await fetch(`/pks/class/${classId}/students?pks_id=${session.pks_id}`);
    const data = await r.json();

    if (data.already_checked) {
      document.getElementById('check-subtitle').textContent = '✓ Sudah dipatroli hari ini — bisa diperbarui';
      document.getElementById('check-notes').value = data.notes || '';
    }

    currentStudents = data.students;
    renderStudents(data.students);
    updateSummary();
  } catch(e) {
    document.getElementById('student-list').innerHTML = '<div class="empty-state"><div class="icon">⚠</div><div>Gagal memuat siswa</div></div>';
  }
}

function renderStudents(students) {
  if (!students.length) {
    document.getElementById('student-list').innerHTML = '<div class="empty-state">Tidak ada siswa</div>';
    return;
  }
  document.getElementById('student-list').innerHTML = students.map((s, i) => `
    <div class="student-row">
      <div class="student-num">${i+1}</div>
      <div style="flex:1;min-width:0">
        <div class="student-name">${escHtml(s.name)}</div>
        <div class="student-gender">${s.gender === 'L' ? 'Laki-laki' : s.gender === 'P' ? 'Perempuan' : ''} · ${s.nis}</div>
      </div>
      <select class="status-select ${s.status}" data-student-id="${s.student_id}"
              onchange="onStatusChange(this)">
        <option value="hadir" ${s.status==='hadir'?'selected':''}>✓ Hadir</option>
        <option value="tidak_hadir" ${s.status==='tidak_hadir'?'selected':''}>✗ Tdk Hadir</option>
        <option value="izin" ${s.status==='izin'?'selected':''}>📋 Izin</option>
        <option value="sakit" ${s.status==='sakit'?'selected':''}>🤒 Sakit</option>
        <option value="alpa" ${s.status==='alpa'?'selected':''}>⚠ Alpa</option>
      </select>
    </div>`).join('');
}

function onStatusChange(sel) {
  const oldClass = ['hadir','tidak_hadir','izin','sakit','alpa'].find(s => sel.classList.contains(s));
  if (oldClass) sel.classList.remove(oldClass);
  sel.classList.add(sel.value);
  updateSummary();
}

function markAll(status) {
  document.querySelectorAll('.status-select').forEach(sel => {
    sel.value = status;
    ['hadir','tidak_hadir','izin','sakit','alpa'].forEach(s => sel.classList.remove(s));
    sel.classList.add(status);
  });
  updateSummary();
}

function updateSummary() {
  const counts = {hadir:0, tidak_hadir:0, izin:0, sakit:0, alpa:0};
  document.querySelectorAll('.status-select').forEach(sel => {
    if (counts[sel.value] !== undefined) counts[sel.value]++;
  });
  document.getElementById('chip-hadir').textContent = `Hadir: ${counts.hadir}`;
  document.getElementById('chip-tidak_hadir').textContent = `Tdk Hadir: ${counts.tidak_hadir}`;
  document.getElementById('chip-izin').textContent = `Izin: ${counts.izin}`;
  document.getElementById('chip-sakit').textContent = `Sakit: ${counts.sakit}`;
  document.getElementById('chip-alpa').textContent = `Alpa: ${counts.alpa}`;
}

async function submitCheck() {
  const selects = document.querySelectorAll('.status-select');
  if (!selects.length) return toast('Tidak ada siswa');

  const students = [];
  selects.forEach(sel => {
    students.push({student_id: parseInt(sel.dataset.studentId), status: sel.value, notes: null});
  });

  const notes = document.getElementById('check-notes').value.trim() || null;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Menyimpan...';

  try {
    const r = await fetch(`/pks/check?pks_id=${session.pks_id}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({class_id: currentClassId, notes, students}),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({detail:'Gagal menyimpan'}));
      toast(err.detail || 'Gagal menyimpan');
      return;
    }
    const data = await r.json();
    toast(`✓ ${data.class_name} — ${data.present} hadir, ${data.absent} tidak hadir`);
    goTo('classes');
    loadClasses();
  } catch(e) {
    toast('Gagal terhubung ke server');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Simpan Presensi';
  }
}

// ── History ───────────────────────────────────────────────────────────────────
async function loadHistory() {
  const el = document.getElementById('history-list');
  el.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><div>Memuat...</div></div>';

  try {
    const r = await fetch(`/pks/history?pks_id=${session.pks_id}`);
    const history = await r.json();

    if (!history.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">📋</div><div>Belum ada riwayat patroli</div></div>';
      return;
    }

    el.innerHTML = history.map(h => {
      const d = new Date(h.check_date);
      const dateStr = d.toLocaleDateString('id-ID', {day:'2-digit',month:'short'});
      return `
        <div class="history-row">
          <div class="history-date">${dateStr}</div>
          <div class="history-info">
            <div class="history-class">${escHtml(h.class_name)}</div>
            <div class="history-meta">
              ${h.present} hadir · ${h.absent} tidak hadir · ${h.total} siswa
              ${h.notes ? `<br><span style="color:var(--text-2)">${escHtml(h.notes)}</span>` : ''}
            </div>
          </div>
          <div style="font-size:11px;color:var(--text-3);white-space:nowrap">
            ${new Date(h.checked_at).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}
          </div>
        </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = '<div class="empty-state"><div class="icon">⚠</div><div>Gagal memuat riwayat</div></div>';
  }
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tab-content-classes').style.display = tab === 'classes' ? 'block' : 'none';
  document.getElementById('tab-content-history').style.display = tab === 'history' ? 'block' : 'none';
  document.getElementById('tab-classes').classList.toggle('active', tab === 'classes');
  document.getElementById('tab-history').classList.toggle('active', tab === 'history');
  if (tab === 'history') loadHistory();
}

// ── Navigation ────────────────────────────────────────────────────────────────
function goTo(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');
  window.scrollTo(0, 0);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function toast(msg, dur=3000) {
  const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), dur);
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const screen = document.querySelector('.screen.active');
    if (screen && screen.id === 'screen-accounts') doLogin();
  }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HADIR — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F6F5F0;
  --bg-card: #FFFFFF;
  --bg-active: #EBF5EE;
  --bg-danger: #FEF0EF;
  --text: #1A1A18;
  --text-2: #5C5B57;
  --text-3: #9C9A92;
  --border: #E5E3DB;
  --accent: #1B7A43;
  --accent-light: #D4EDDB;
  --accent-dark: #145C32;
  --danger: #C53030;
  --danger-light: #FED7D7;
  --warning: #B7791F;
  --warning-light: #FEFCBF;
  --info: #2B6CB0;
  --info-light: #BEE3F8;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 14px rgba(0,0,0,0.08);
  --font: 'DM Sans', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  -webkit-tap-highlight-color: transparent;
}
.screen { display: none; min-height: 100dvh; padding: 0 0 32px; }
.screen.active { display: block; animation: fadeIn .25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.top-bar {
  position: sticky; top: 0; z-index: 10;
  background: var(--accent); color: #fff;
  padding: 16px 20px;
  display: flex; align-items: center; gap: 12px;
}
.top-bar h1 { font-size: 18px; font-weight: 600; letter-spacing: .5px; }
.top-bar .subtitle { font-size: 12px; opacity: .75; margin-top: 2px; }
.top-bar .back-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,.15); border: none; color: #fff;
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.top-bar .back-btn:active { background: rgba(255,255,255,.3); }
.content { padding: 16px 16px 0; }
.section-label {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1.2px; color: var(--text-3);
  padding: 20px 16px 8px;
}
.card {
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 20px;
  margin-bottom: 12px; box-shadow: var(--shadow);
}
.input-group { margin-bottom: 16px; }
.input-group label {
  display: block; font-size: 13px; font-weight: 500;
  color: var(--text-2); margin-bottom: 6px;
}
.input-group input {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  font-family: var(--font); font-size: 16px;
  background: var(--bg); color: var(--text);
  transition: border-color .15s;
}
.input-group input:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
}
.pin-input {
  font-family: var(--mono) !important;
  font-size: 28px !important; text-align: center;
  letter-spacing: 8px; font-weight: 500;
}
.btn {
  display: block; width: 100%;
  padding: 14px 20px; border: none; border-radius: var(--radius-sm);
  font-family: var(--font); font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all .15s; text-align: center;
}
.btn:active { transform: scale(.98); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-dark); }
.btn-primary:disabled { background: var(--text-3); cursor: not-allowed; }
.btn-outline { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }

/* Role cards */
.role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 8px 16px 16px; }
.role-card.pks { border-color: #D6BCFA; }
.role-card.pks:hover { border-color: #6B46C1; }
.role-card.pks.selected { border-color: #6B46C1; background: #F5F0FF; }
.role-card {
  background: var(--bg-card); border-radius: var(--radius);
  border: 2px solid var(--border); padding: 20px 16px;
  cursor: pointer; text-align: center; transition: all .15s;
  box-shadow: var(--shadow);
}
.role-card:active { transform: scale(.97); }
.role-card:hover { border-color: var(--accent); }
.role-card.selected { border-color: var(--accent); background: var(--bg-active); }
.role-icon { font-size: 32px; margin-bottom: 8px; }
.role-name { font-size: 14px; font-weight: 600; color: var(--text); }
.role-desc { font-size: 11px; color: var(--text-3); margin-top: 4px; }

/* Staff buttons */
.staff-grid { display: grid; grid-template-columns: 1fr; gap: 8px; padding: 8px 16px; }
.staff-btn {
  padding: 16px; background: var(--bg-card);
  border: 1.5px solid var(--border); border-radius: var(--radius);
  font-family: var(--font); font-size: 15px; font-weight: 500;
  cursor: pointer; text-align: left; transition: all .15s;
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow);
}
.staff-btn:active { transform: scale(.98); }
.staff-btn .avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--accent-light); color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 16px; flex-shrink: 0;
}
.staff-btn.headmaster .avatar { background: var(--info-light); color: var(--info); }
.staff-btn.selected { border-color: var(--accent); background: var(--bg-active); }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: #fff;
  padding: 12px 20px; border-radius: 10px;
  font-size: 14px; font-weight: 500;
  box-shadow: var(--shadow-lg); z-index: 200;
  animation: toastIn .3s ease; pointer-events: none;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } }

.empty-state { text-align: center; padding: 40px 20px; color: var(--text-3); }
.empty-state .icon { font-size: 40px; margin-bottom: 8px; }

.divider {
  text-align: center; font-size: 11px; color: var(--text-3);
  padding: 12px 16px; font-weight: 500; letter-spacing: .5px;
}
</style>
</head>
<body>

<!-- ── SCREEN 1: Role Selection ─────────────────────────────────────────── -->
<div id="screen-role" class="screen active">
  <div class="top-bar">
    <div>
      <h1>HADIR</h1>
      <div class="subtitle">Sistem Presensi SMAN 5 Garut</div>
    </div>
  </div>
  <div class="section-label">Masuk sebagai</div>
  <div class="role-grid">
    <div class="role-card" id="role-admin" onclick="selectRole('admin')">
      <div class="role-icon">📋</div>
      <div class="role-name">Admin</div>
      <div class="role-desc">Input presensi harian</div>
    </div>
    <div class="role-card" id="role-headmaster" onclick="selectRole('headmaster')">
      <div class="role-icon">🏫</div>
      <div class="role-name">Kepala Sekolah</div>
      <div class="role-desc">Pantau & laporan</div>
    </div>
    <div class="role-card pks" id="role-pks" onclick="selectRole('pks')" style="grid-column:1/-1">
      <div class="role-icon">🛡️</div>
      <div class="role-name">PKS</div>
      <div class="role-desc">Patroli Keamanan Sekolah — cek kehadiran kelas</div>
    </div>
  </div>
  <div style="text-align:center;padding:24px 16px 0">
    <span style="font-size:11px;color:var(--text-3);cursor:pointer;opacity:.35" onclick="selectRole('owner')">Administrator</span>
  </div>
</div>

<!-- ── SCREEN 2: Staff List + PIN ──────────────────────────────────────── -->
<div id="screen-login" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="goTo('role')">←</button>
    <div>
      <h1 id="login-title">Login</h1>
      <div class="subtitle" id="login-subtitle">Pilih akun Anda</div>
    </div>
  </div>
  <div id="staff-list" class="staff-grid"></div>
  <div class="content" id="pin-section" style="display:none">
    <div class="input-group">
      <label>Masukkan PIN</label>
      <input type="password" id="pin-input" class="pin-input" inputmode="numeric" maxlength="6" placeholder="••••">
    </div>
    <button class="btn btn-primary" onclick="doLogin()">Masuk</button>
    <div class="divider" id="selected-name-hint"></div>
  </div>
</div>

<script>
let selectedRole = null;
let selectedStaffId = null;
let selectedStaffName = '';

// Redirect if already logged in
(function() {
  try {
    const sess = JSON.parse(sessionStorage.getItem('hadir_auth') || 'null');
    if (!sess) return;
    if (sess.role === 'admin') { window.location.replace('/input'); return; }
    if (sess.role === 'headmaster') { window.location.replace('/dashboard'); return; }
    if (sess.role === 'owner') { window.location.replace('/panel'); return; }
    if (sess.role === 'pks') { window.location.replace('/pks-patrol'); return; }
  } catch(e) { sessionStorage.removeItem('hadir_auth'); }
})();

function goTo(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');
  window.scrollTo(0, 0);
}

function toast(msg, dur=2500) {
  const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), dur);
}

async function selectRole(role) {
  selectedRole = role;
  selectedStaffId = null;
  selectedStaffName = '';

  document.getElementById('pin-section').style.display = 'none';
  document.getElementById('pin-input').value = '';

  // Owner — skip staff list, go straight to PIN
  if (role === 'owner') {
    document.getElementById('login-title').textContent = 'Administrator';
    document.getElementById('login-subtitle').textContent = 'Masukkan PIN administrator';
    document.getElementById('staff-list').innerHTML = '';
    document.getElementById('pin-section').style.display = 'block';
    document.getElementById('selected-name-hint').textContent = '';
    goTo('login');
    document.getElementById('pin-input').focus();
    return;
  }

  // Admin, Headmaster, or PKS — show staff list
  const titles = {
    admin: ['Login Admin', 'Pilih akun admin Anda'],
    headmaster: ['Login Kepala Sekolah', 'Masuk sebagai kepala sekolah'],
    pks: ['Login PKS', 'Pilih kelompok PKS Anda'],
  };
  document.getElementById('login-title').textContent = titles[role][0];
  document.getElementById('login-subtitle').textContent = titles[role][1];

  goTo('login');

  try {
    const r = await fetch(`/auth/staff?role=${role}`);
    const staff = await r.json();
    const roleLabels = {
      admin: ['Admin', 'akun admin', 'Admin Presensi'],
      headmaster: ['Kepala Sekolah', 'akun kepala sekolah', 'Kepala Sekolah'],
      pks: ['PKS', 'akun PKS', 'Patroli Keamanan Sekolah'],
    };
    const [labelShort, labelEmpty, labelDesc] = roleLabels[role] || ['Akun','akun','Staff'];
    document.getElementById('staff-list').innerHTML = staff.length === 0
      ? `<div class="empty-state"><div class="icon">⚠</div><div>Tidak ada ${labelEmpty} terdaftar</div><div style="font-size:12px;margin-top:4px">Hubungi administrator</div></div>`
      : staff.map(s => `
          <button class="staff-btn ${role}" onclick="selectStaff(${s.staff_id}, '${s.name.replace(/'/g,"\\'")}', this)">
            <div class="avatar">${s.name.charAt(0)}</div>
            <div>
              <div>${s.name}</div>
              <div style="font-size:12px;color:var(--text-3);margin-top:2px">${labelDesc}</div>
            </div>
          </button>`).join('');
  } catch(e) {
    document.getElementById('staff-list').innerHTML =
      '<div class="empty-state"><div class="icon">⚠</div><div>Tidak dapat terhubung ke server</div></div>';
  }
}

function selectStaff(id, name, btn) {
  selectedStaffId = id;
  selectedStaffName = name;
  document.querySelectorAll('.staff-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('pin-section').style.display = 'block';
  document.getElementById('selected-name-hint').textContent = `Masuk sebagai: ${name}`;
  document.getElementById('pin-input').focus();
}

async function doLogin() {
  const pin = document.getElementById('pin-input').value;
  if (!pin) return toast('Masukkan PIN');

  // Owner login — dedicated endpoint
  if (selectedRole === 'owner') {
    try {
      const r = await fetch('/auth/owner-login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({pin}),
      });
      if (!r.ok) {
        const err = await r.json().catch(() => ({detail: 'PIN salah'}));
        return toast(err.detail || 'PIN salah');
      }
      sessionStorage.setItem('hadir_auth', JSON.stringify({
        staffId: null, name: 'Administrator', role: 'owner',
      }));
      window.location.replace('/panel');
    } catch(e) { toast('Gagal terhubung ke server'); }
    return;
  }

  // Normal staff login
  if (!selectedStaffId) return toast('Pilih akun terlebih dahulu');

  try {
    const r = await fetch('/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({staff_id: selectedStaffId, pin}),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({detail: 'PIN salah'}));
      return toast(err.detail || 'PIN salah');
    }
    const data = await r.json();

    sessionStorage.setItem('hadir_auth', JSON.stringify({
      staffId: data.staff_id, name: data.name, role: data.role,
    }));

    if (data.role === 'admin') window.location.replace('/input');
    else if (data.role === 'headmaster') window.location.replace('/dashboard');
    else if (data.role === 'pks') window.location.replace('/pks-patrol');
    else window.location.replace('/dashboard');
  } catch(e) {
    toast('Gagal terhubung ke server');
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const screen = document.querySelector('.screen.active');
    if (screen && screen.id === 'screen-login') doLogin();
  }
});
</script>
</body>
</html>
